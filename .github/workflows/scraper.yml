name: Scraper Loto Honduras
on:
  workflow_dispatch:
    inputs:
      tanda:
        description: 'Forzar tanda (manana/tarde/noche) — dejar vacío para automático'
        required: false
        default: ''
permissions:
  contents: write
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: 🎭 Cache Playwright browsers
        uses: actions/cache@v3
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}
      - name: 🎭 Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps
      - name: 🚀 Run scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          CF_ZONE_ID:         ${{ secrets.CF_ZONE_ID }}
          CF_TOKEN:           ${{ secrets.CF_TOKEN }}
          FORZAR_TANDA:       ${{ github.event.inputs.tanda }}
        run: |
          python loto_scraper.py
          echo "✅ Scraper ejecutado - $(date +'%Y-%m-%d %H:%M:%S UTC')"
      - name: 🔮 Run oráculo
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python oraculo.py
          echo "✅ Oráculo ejecutado - $(date +'%Y-%m-%d %H:%M:%S UTC')"
      - name: 📊 Check for changes
        id: verify_diff
        run: |
          git add resultados_hoy.json historial.json oraculo.json
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      - name: 💾 Commit and push changes
        if: steps.verify_diff.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git commit -m "🔮 Oráculo + resultados - $(date +'%Y-%m-%d %H:%M:%S')"
          git push
      - name: ℹ️ No changes detected
        if: steps.verify_diff.outputs.changed != 'true'
        run: echo "ℹ️ No se detectaron cambios"

        
