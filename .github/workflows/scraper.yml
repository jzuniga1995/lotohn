name: Scraper Loto Honduras
on:
  # schedule:
    # Horarios originales de producción
    # - cron: '10 17 * * *'  # 11:10 AM Honduras = 5:10 PM UTC
    # - cron: '10 21 * * *'  # 3:10 PM Honduras = 9:10 PM UTC
    # - cron: '10 3 * * *'   # 9:10 PM Honduras = 3:10 AM UTC (día siguiente)
  
  workflow_dispatch:  # ✅ MANTÉN ESTO - permite ejecución manual desde cron-job.org

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 🔄 Run scraper
        run: |
          python loto_scraper.py
          echo "✅ Scraper ejecutado - $(date +'%Y-%m-%d %H:%M:%S UTC')"
      
      - name: 📊 Check for changes
        id: verify_diff
        run: |
          git add resultados_hoy.json
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      
      - name: 💾 Commit and push changes
        if: steps.verify_diff.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git commit -m "🎯 Actualizar resultados - $(date +'%Y-%m-%d %H:%M:%S')"
          git push
      
      - name: ℹ️ No changes detected
        if: steps.verify_diff.outputs.changed != 'true'
        run: echo "ℹ️ No se detectaron cambios en los resultados"
